{{ define "review_results_partial.html" }}
{{ range . }}
<div class="flex items-center gap-3 p-2 bg-gray-800 hover:bg-gray-750 rounded-lg">
    {{ if .CoverURL }}
    <img src="{{ .CoverURL }}" alt="{{ .Name }}" class="w-10 h-10 rounded object-cover shrink-0" />
    {{ else }}
    <div class="w-10 h-10 rounded bg-gray-700 shrink-0"></div>
    {{ end }}

    <div class="flex-1 min-w-0">
        <div class="text-sm font-medium truncate">{{ .Name }}</div>
        <div class="text-xs text-gray-500">{{ .ReleaseYear }}</div>
    </div>

    <button
        hx-post="/review/{{ .GameID }}/match"
        hx-vals='{"igdb_id": "{{ .IGDBID }}"}'
        hx-target="#card-{{ .GameID }}"
        hx-swap="outerHTML"
        class="shrink-0 px-2 py-1 bg-amber-500 hover:bg-amber-400 text-gray-950 text-xs font-semibold rounded transition">
        Match
    </button>
</div>
{{ else }}
<div class="text-xs text-gray-500 py-2">No results found.</div>
{{ end }}
{{ end }}
